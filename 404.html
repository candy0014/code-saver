<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <script>
    (function() {
      const repo = "code-saver";

      const path = location.pathname;
      const parts = path.split("/").filter(x => x);

      // 去掉仓库名
      if (parts[0] === repo) parts.shift();

      const problem = parts[0] || "";
      const page = parts[1] || "index";

      let file = "index.md";

      if (page === "index") file = "index.md";
      else if (page === "sol") file = "sol.md";
      else if (page.startsWith("code")) file = page + ".cpp";

      location.replace(
        "/" + repo +
        "/viewer.html?problem=" + problem +
        "&file=" + file
      );
    })();
  </script>
</head>
<body></body>
</html>
