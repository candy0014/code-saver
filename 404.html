<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <script>
    (function() {
      const repo = "code-saver";

      let path = location.pathname;

      // 去掉仓库名
      path = path.replace("/" + repo, "");

      const parts = path.split("/").filter(x => x);

      const problem = parts[0] || "";
      let file = "index.md";

      if (parts.length >= 2) {
        let p = parts.slice(1).join("/");

        // 如果没有扩展名，自动补
        if (!p.includes(".")) {
          if (p === "sol") p = "sol.md";
          else if (p.startsWith("code")) p += ".cpp";
          else p += ".md";
        }

        file = p;
      }

      location.replace(
        "/" + repo +
        "/viewer.html?problem=" + problem +
        "&file=" + file
      );
    })();
  </script>
</head>
<body></body>
</html>
