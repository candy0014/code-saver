<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    (function () {
      const path = window.location.pathname;

      // 匹配需要接管的文件类型
      if (path.match(/\.(md|cpp|txt|py|java|json)$/)) {

        const parts = path.split("/");
        const file = parts.pop();        // 文件名
        const dir = parts.join("/");     // 目录

        // 跳转到目录 index.html，并带参数
        window.location.replace(
          dir + "/?file=" + encodeURIComponent(file)
        );
      }
    })();
  </script>
</head>
<body>
Redirecting...
</body>
</html>
