<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
(function () {
  const path = window.location.pathname;

  if (path.endsWith(".md")) {
    const parts = path.split("/");
    const file = parts.pop();              // sol.md
    const dir = parts.join("/");           // /problems/P15142

    window.location.replace(
      dir + "/?file=" + file
    );
  }
})();
</script>
</head>
<body></body>
</html>
