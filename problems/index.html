<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Problems</title>
  <link rel="stylesheet" href="../style.css">

  <style>
    .nav { margin-bottom: 15px; }
    .nav a { margin-right: 12px; }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #30363d;
      padding: 8px 12px;
      text-align: left;
    }

    th { background: #161b22; }

    tr:hover { background: #1f2630; }

    .tag {
      display: inline-block;
      background: #30363d;
      padding: 2px 6px;
      margin-right: 4px;
      border-radius: 4px;
      font-size: 12px;
    }

    .pagination { margin-top: 10px; }

    .jump { margin-top: 10px; }

    .sort-btn {
      cursor: pointer;
      margin-left: 5px;
    }

    .active-page {
      background: #1f6feb;
      color: white;
      font-weight: bold;
      border: 1px solid #388bfd;
    }
  </style>
</head>

<body>

<div class="nav">
  <a id="home">🏠 Home</a>
  <a href="../">⬅ Back</a>
</div>

<h1>Problem List</h1>

<!-- 分页 -->
<div class="pagination" id="pagination"></div>

<div class="jump">
  跳到第 
  <input id="jumpInput" type="number" min="1" style="width:60px;">
  页
  <button onclick="jumpPage()">Go</button>
</div>

<table>
  <thead>
    <tr>
      <th>题号</th>
      <th>难度</th>
      <th>标签</th>
      <th>
        提交时间
        <span class="sort-btn" id="timeSortBtn">⬇️</span>
      </th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

<script>
// ==========================
// URL 参数读取
// ==========================
function getQuery() {
  const params = new URLSearchParams(location.search);
  return {
    page: parseInt(params.get("page")) || 1,
    order: params.get("order") || "desc"
  };
}

// ==========================
// URL 更新
// ==========================
function updateURL() {
  const params = new URLSearchParams();

  params.set("page", currentPage);
  params.set("order", timeDesc ? "desc" : "asc");

  history.replaceState(null, "", "?" + params.toString());
}

// ==========================
// 初始化
// ==========================
const base = location.pathname.includes("/code-saver/")
  ? "/code-saver/"
  : "/";

document.getElementById("home").href = base;

const query = getQuery();

let data = [];
let currentPage = query.page;
const pageSize = 100;
let timeDesc = query.order !== "asc";

// ==========================
// 排序
// ==========================
function sortData() {
  data.sort((a, b) => {
    const ta = a.time || "";
    const tb = b.time || "";
    return timeDesc
      ? tb.localeCompare(ta)
      : ta.localeCompare(tb);
  });
}

// ==========================
// 渲染
// ==========================
function render() {
  sortData();

  const totalPages = Math.max(1, Math.ceil(data.length / pageSize));
  if (currentPage > totalPages) currentPage = totalPages;

  const tbody = document.getElementById("list");
  tbody.innerHTML = "";

  const start = (currentPage - 1) * pageSize;
  const end = start + pageSize;

  data.slice(start, end).forEach(item => {
    const tr = document.createElement("tr");

    const tdName = document.createElement("td");
    const a = document.createElement("a");

    const name = (item.names && item.names.length > 0)
      ? item.names[0]
      : "???";

    a.href = base + "problems/" + name + "/";
    a.textContent = name;

    tdName.appendChild(a);

    const tdDiff = document.createElement("td");
    tdDiff.textContent = item.difficulty || "";

    const tdTags = document.createElement("td");
    if (Array.isArray(item.tags)) {
      item.tags.forEach(tag => {
        const span = document.createElement("span");
        span.className = "tag";
        span.textContent = tag;
        tdTags.appendChild(span);
      });
    }

    const tdTime = document.createElement("td");
    tdTime.textContent = item.time || "";

    tr.appendChild(tdName);
    tr.appendChild(tdDiff);
    tr.appendChild(tdTags);
    tr.appendChild(tdTime);

    tbody.appendChild(tr);
  });

  renderPagination();
  updateURL();
}

// ==========================
// 分页
// ==========================
function renderPagination() {
  const totalPages = Math.ceil(data.length / pageSize);
  const container = document.getElementById("pagination");
  container.innerHTML = "";

  const info = document.createElement("span");
  info.textContent = `第 ${currentPage} / ${totalPages} 页 `;
  container.appendChild(info);

  const first = document.createElement("button");
  first.textContent = "««";
  first.disabled = currentPage === 1;
  first.onclick = () => { currentPage = 1; render(); };
  container.appendChild(first);

  const prev = document.createElement("button");
  prev.textContent = "«";
  prev.disabled = currentPage === 1;
  prev.onclick = () => { currentPage--; render(); };
  container.appendChild(prev);

  let left = currentPage - 2;
  let right = currentPage + 2;

  if (left < 1) {
    right += (1 - left);
    left = 1;
  }

  if (right > totalPages) {
    left -= (right - totalPages);
    right = totalPages;
  }

  if (left < 1) left = 1;

  for (let i = left; i <= right; i++) {
    const btn = document.createElement("button");
    btn.textContent = i;

    if (i === currentPage) {
      btn.classList.add("active-page");
      btn.disabled = true;
    }

    btn.onclick = () => {
      currentPage = i;
      render();
    };

    container.appendChild(btn);
  }

  const next = document.createElement("button");
  next.textContent = "»";
  next.disabled = currentPage === totalPages;
  next.onclick = () => { currentPage++; render(); };
  container.appendChild(next);

  const last = document.createElement("button");
  last.textContent = "»»";
  last.disabled = currentPage === totalPages;
  last.onclick = () => { currentPage = totalPages; render(); };
  container.appendChild(last);
}

// ==========================
// 跳页
// ==========================
function jumpPage() {
  const input = document.getElementById("jumpInput");
  const totalPages = Math.ceil(data.length / pageSize);

  let page = parseInt(input.value);
  if (isNaN(page)) return;

  if (page < 1) page = 1;
  if (page > totalPages) page = totalPages;

  currentPage = page;
  render();
}

document.getElementById("jumpInput").addEventListener("keydown", e => {
  if (e.key === "Enter") jumpPage();
});

// ==========================
// 排序按钮
// ==========================
document.getElementById("timeSortBtn").onclick = () => {
  timeDesc = !timeDesc;

  document.getElementById("timeSortBtn").textContent =
    timeDesc ? "⬇️" : "⬆️";

  currentPage = 1;
  render();
};

// ==========================
// 加载数据
// ==========================
fetch("index.json")
  .then(r => r.json())
  .then(json => {
    data = json;

    document.getElementById("timeSortBtn").textContent =
      timeDesc ? "⬇️" : "⬆️";

    render();
  })
  .catch(err => {
    console.error(err);
    document.getElementById("list").innerHTML =
      "<tr><td colspan='4'>❌ Failed to load</td></tr>";
  });

</script>

</body>
</html>
