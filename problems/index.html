<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Problems</title>
  <link rel="stylesheet" href="../style.css">

  <style>
    .nav {
      margin-bottom: 15px;
    }

    .nav a {
      margin-right: 12px;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="/code-saver" id="home">🏠 Home</a>
  <a href="../" id="back">⬅ Back</a>
</div>

<h1>Problem List</h1>

<ul id="list"></ul>

<script>
const user = "candy0014";
const repo = "code-saver";

fetch("index.json")
  .then(r => r.json())
  .then(data => {
    const list = document.getElementById("list");
    list.innerHTML = ""; // 清空旧内容

    data.forEach(name => {
      const li = document.createElement("li");
      const a = document.createElement("a");

      a.href = `/code-saver/problems/${name}/`;
      a.textContent = name;

      li.appendChild(a);
      list.appendChild(li);
    });
  })
  .catch(err => {
    console.error(err);
    document.getElementById("list").innerHTML =
      "<li>❌ Failed to load problems</li>";
  });
</script>

</body>
</html>
