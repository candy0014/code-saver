<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <!-- 相对路径基准 -->
  <base id="base">

  <title>Loading...</title>

  <!-- ================= Markdown ================= -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- ================= KaTeX ================= -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <!-- ================= highlight.js ================= -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.css">

  <script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/highlight.js"></script>

  <!-- ================= 你的 CSS ================= -->
  <link rel="stylesheet" href="/code-saver/style.css">

</head>

<body>

  <!-- 页面标题 -->
  <h1 id="page-title"></h1>

  <div class="nav">
    <a href="/code-saver" id="home">🏠 Home</a>
    <a href="../" id="back">⬅ Back</a>
  </div>

  <div id="content"></div>

  <!-- ================= 初始化脚本 ================= -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      /* =============================
         1️⃣ 从 URL 提取标题
      ============================= */
      const path = window.location.pathname;

      const cleanPath = path.endsWith("/")
        ? path.slice(0, -1)
        : path;

      let lastPart = cleanPath.split("/").pop() || "Home";

      // 去掉 .md / .html 后缀
      lastPart = lastPart.replace(/\.(md|html)$/, "");

      document.title = lastPart;

      const titleEl = document.getElementById("page-title");
      if (titleEl) titleEl.textContent = lastPart;

      /* =============================
         2️⃣ Markdown 设置
      ============================= */
      if (window.marked) {
        marked.setOptions({
          breaks: true
        });
      }

      /* =============================
         3️⃣ highlight.js
      ============================= */
      if (window.hljs) {
        hljs.highlightAll();
      }

      /* =============================
         4️⃣ KaTeX
      ============================= */
      if (window.renderMathInElement) {
        renderMathInElement(document.body, {
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "$", right: "$", display: false }
          ]
        });
      }

    });
  </script>

  <!-- ================= viewer 主逻辑 ================= -->
  <script src="/code-saver/viewer.js"></script>

</body>
</html>
