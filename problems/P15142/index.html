<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    const repo = "code-saver";

    const parts = location.pathname.split("/").filter(x => x);
    const idx = parts.indexOf("problems");
    const problem = parts[idx + 1];

    // 支持 ?file=xxx
    const params = new URLSearchParams(location.search);
    const file = params.get("file") || "index.md";

    location.replace(
      "/" + repo +
      "/viewer.html?problem=" + problem +
      "&file=" + file
    );
  </script>
</head>
<body></body>
</html>
